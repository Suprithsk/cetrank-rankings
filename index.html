<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KCET Cutoffs Explorer</title>
<style>
  :root{
    --bg:#0f1117; --panel:#171a23; --panel-2:#1e222d; --border:#2a2f3c;
    --text:#e6e8ee; --muted:#8b93a7; --accent:#5b8cff; --accent-2:#7c5cff;
    --good:#3ecf8e; --warn:#f5b94d; --bad:#ff6b6b;
    --radius:12px;
  }
  *{box-sizing:border-box}
  body{
    margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(1200px 600px at 80% -10%, #1b2030 0%, var(--bg) 60%); color:var(--text);
    min-height:100vh; line-height:1.5;
  }
  header{
    padding:28px 24px 18px; max-width:1200px; margin:0 auto;
  }
  h1{
    margin:0; font-size:26px; font-weight:700; letter-spacing:-.5px;
    background:linear-gradient(90deg,var(--accent),var(--accent-2));
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
  }
  .sub{color:var(--muted); font-size:14px; margin-top:6px}
  .wrap{max-width:1200px; margin:0 auto; padding:0 24px 60px}
  .controls{
    display:grid; grid-template-columns:1.5fr 1.5fr 1fr 1fr 1fr auto; gap:12px;
    background:var(--panel); border:1px solid var(--border); border-radius:var(--radius);
    padding:16px; margin-bottom:18px; align-items:end;
  }
  @media (max-width:820px){ .controls{grid-template-columns:1fr 1fr} }
  .field{display:flex; flex-direction:column; gap:6px; min-width:0}
  .field label{font-size:11px; text-transform:uppercase; letter-spacing:.6px; color:var(--muted)}
  input,select{
    background:var(--panel-2); border:1px solid var(--border); color:var(--text);
    padding:10px 12px; border-radius:8px; font-size:14px; outline:none; width:100%;
  }
  input:focus,select:focus{border-color:var(--accent); box-shadow:0 0 0 3px rgba(91,140,255,.18)}
  .reset{
    background:var(--panel-2); border:1px solid var(--border); color:var(--text);
    padding:10px 14px; border-radius:8px; cursor:pointer; font-size:14px; white-space:nowrap;
  }
  .reset:hover{border-color:var(--accent)}

  /* multiselect dropdown */
  .ms{position:relative}
  .ms-toggle{
    background:var(--panel-2); border:1px solid var(--border); color:var(--text);
    padding:10px 12px; border-radius:8px; font-size:14px; width:100%; text-align:left;
    cursor:pointer; display:flex; justify-content:space-between; align-items:center; gap:8px;
  }
  .ms-toggle:hover{border-color:var(--accent)}
  .ms-toggle.active{border-color:var(--accent); box-shadow:0 0 0 3px rgba(91,140,255,.18)}
  .ms-toggle .ct{color:var(--text); overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .ms-toggle .ct.placeholder{color:var(--muted)}
  .ms-toggle .caret{color:var(--muted); font-size:10px; flex:0 0 auto}
  .ms-panel{
    position:absolute; z-index:30; top:calc(100% + 6px); left:0; right:0;
    background:var(--panel-2); border:1px solid var(--border); border-radius:10px;
    box-shadow:0 12px 30px rgba(0,0,0,.45); padding:8px; max-height:340px; overflow:auto;
    display:none; min-width:300px;
  }
  .ms-panel.open{display:block}
  .ms-search{margin-bottom:6px}
  .ms-actions{display:flex; gap:8px; padding:2px 4px 8px; border-bottom:1px solid var(--border); margin-bottom:6px}
  .ms-actions button{
    background:transparent; border:none; color:var(--accent); cursor:pointer; font-size:12px; padding:2px 4px;
  }
  .ms-actions button:hover{text-decoration:underline}
  .ms-opt{
    display:flex; align-items:center; gap:10px; padding:7px 8px; border-radius:6px; cursor:pointer; font-size:13px;
  }
  .ms-opt:hover{background:rgba(91,140,255,.08)}
  .ms-opt input{width:auto; padding:0; accent-color:var(--accent)}
  .ms-opt.hide{display:none}

  .stats{display:flex; gap:10px; flex-wrap:wrap; margin-bottom:14px}
  .chip{
    background:var(--panel); border:1px solid var(--border); border-radius:999px;
    padding:6px 14px; font-size:13px; color:var(--muted);
  }
  .chip b{color:var(--text)}

  .active-filters{display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:14px; min-height:30px}
  .active-filters .af-none{color:var(--muted); font-size:13px}
  .af-chip{
    display:inline-flex; align-items:center; gap:8px; font-size:13px; max-width:340px;
    background:rgba(91,140,255,.12); border:1px solid rgba(91,140,255,.35); color:var(--text);
    border-radius:999px; padding:5px 6px 5px 12px;
  }
  .af-chip .af-key{color:var(--accent); font-weight:600; text-transform:uppercase; font-size:10px; letter-spacing:.5px}
  .af-chip .af-val{overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .af-chip .af-x{
    cursor:pointer; border:none; background:rgba(255,255,255,.08); color:var(--text);
    width:18px; height:18px; border-radius:50%; line-height:1; font-size:13px; flex:0 0 auto;
    display:flex; align-items:center; justify-content:center;
  }
  .af-chip .af-x:hover{background:var(--bad); color:#fff}
  .af-clear{
    background:transparent; border:none; color:var(--muted); cursor:pointer; font-size:13px; text-decoration:underline;
  }
  .af-clear:hover{color:var(--text)}
  .table-wrap{
    background:var(--panel); border:1px solid var(--border); border-radius:var(--radius);
    overflow:auto; max-height:70vh;
  }
  table{width:100%; border-collapse:collapse; font-size:14px}
  thead th{
    position:sticky; top:0; background:var(--panel-2); text-align:left; padding:12px 16px;
    font-size:12px; text-transform:uppercase; letter-spacing:.5px; color:var(--muted);
    cursor:pointer; user-select:none; white-space:nowrap; border-bottom:1px solid var(--border);
  }
  thead th:hover{color:var(--text)}
  thead th .arrow{opacity:.5; font-size:10px}
  tbody td{padding:11px 16px; border-bottom:1px solid rgba(42,47,60,.6)}
  tbody tr:hover{background:rgba(91,140,255,.06)}
  .college{font-weight:600}
  .course{color:var(--muted)}
  .rank{font-variant-numeric:tabular-nums; font-weight:600}
  .badge{
    display:inline-block; padding:2px 9px; border-radius:6px; font-size:12px; font-weight:600;
  }
  .y2025{background:rgba(62,207,142,.15); color:var(--good)}
  .y2024{background:rgba(245,185,77,.15); color:var(--warn)}
  .y2023{background:rgba(124,92,255,.18); color:#b3a0ff}
  .round{color:var(--muted); font-size:13px}
  .empty{padding:50px; text-align:center; color:var(--muted)}
  footer{text-align:center; color:var(--muted); font-size:12px; padding:24px}
</style>
</head>

<header>
  <h1>KCET Cutoffs Explorer</h1>
  <div class="sub">Closing state ranks across colleges, courses, years and counselling rounds.</div>
</header>
<div class="wrap">

    <div class="field">
      <label>Colleges</label>

          <span class="caret">&#9660;</span>
        </button>
        <div class="ms-panel">
          <input class="ms-search" type="text" placeholder="Search colleges...">
          <div class="ms-actions">
            <button type="button" class="ms-all">Select all</button>
            <button type="button" class="ms-none">Clear</button>
          </div>
          <div class="ms-list"></div>
        </div>
      </div>
    </div>
    <div class="field">
      <label>Courses</label>
      <div class="ms" data-ms="course" data-all="All courses" data-noun="courses">
        <button type="button" class="ms-toggle">
          <span class="ct placeholder ms-label">All courses</span>
          <span class="caret">&#9660;</span>
        </button>
        <div class="ms-panel">
          <input class="ms-search" type="text" placeholder="Search courses...">
          <div class="ms-actions">
            <button type="button" class="ms-all">Select all</button>
            <button type="button" class="ms-none">Clear</button>
          </div>
          <div class="ms-list"></div>
        </div>
      </div>
    </div>
    <div class="field">
      <label>Year</label>
      <select id="year"></select>
    </div>
    <div class="field">
      <label>Round</label>
      <select id="round"></select>
    </div>
    <div class="field">
      <label>Max closing rank</label>
      <input id="maxrank" type="number" placeholder="e.g. 10000" min="0">
    </div>
    <button class="reset" id="reset">Reset</button>
  </div>

  <div class="stats">
    <span class="chip">Showing <b id="count">0</b> rows</span>
    <span class="chip"><b id="ncol">0</b> colleges</span>
    <span class="chip"><b id="ncourse">0</b> courses</span>
  </div>

  <div class="active-filters" id="activeFilters"></div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th data-key="college">College <span class="arrow"></span></th>
          <th data-key="course">Course <span class="arrow"></span></th>
          <th data-key="year">Year <span class="arrow"></span></th>
          <th data-key="round">Round <span class="arrow"></span></th>
          <th data-key="rank">Closing Rank <span class="arrow"></span></th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    <div class="empty" id="empty" style="display:none">No matching records.</div>
  </div>
</div>
<footer>Source: kcet_cutoffs.csv &middot; General category closing state ranks</footer>

const $=s=>document.querySelector(s);
const yearSel=$('#year'), roundSel=$('#round'), maxrank=$('#maxrank');
let sortKey='rank', sortDir=1;

function uniq(key){return [...new Set(DATA.map(r=>r[key]))];}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

// ---- reusable multiselect ----
class MultiSelect{
  constructor(el,values,onChange){
    this.el=el; this.key=el.dataset.ms; this.allLabel=el.dataset.all; this.noun=el.dataset.noun;
    this.onChange=onChange; this.selected=new Set();
    this.toggleBtn=el.querySelector('.ms-toggle');
    this.panel=el.querySelector('.ms-panel');
    this.labelEl=el.querySelector('.ms-label');
    this.search=el.querySelector('.ms-search');
    this.list=el.querySelector('.ms-list');
    this.list.innerHTML=values.map(v=>`<label class="ms-opt"><input type="checkbox" value="${esc(v)}"><span>${esc(v)}</span></label>`).join('');
    this.list.querySelectorAll('input').forEach(cb=>cb.addEventListener('change',()=>{
      if(cb.checked) this.selected.add(cb.value); else this.selected.delete(cb.value);
      this.updateLabel(); this.onChange();
    }));
    this.toggleBtn.addEventListener('click',e=>{
      e.stopPropagation();
      const open=this.panel.classList.toggle('open');
      this.toggleBtn.classList.toggle('active',open);
      if(open) this.search.focus();
    });
    this.panel.addEventListener('click',e=>e.stopPropagation());
    this.search.addEventListener('input',()=>{
      const t=this.search.value.trim().toLowerCase();
      this.list.querySelectorAll('.ms-opt').forEach(o=>o.classList.toggle('hide', t && !o.textContent.toLowerCase().includes(t)));
    });
    el.querySelector('.ms-all').addEventListener('click',()=>this.setVisible(true));
    el.querySelector('.ms-none').addEventListener('click',()=>this.setVisible(false));
    this.updateLabel();
  }
  setVisible(state){
    this.list.querySelectorAll('.ms-opt').forEach(o=>{
      if(o.classList.contains('hide')) return;
      const cb=o.querySelector('input'); cb.checked=state;
      if(state) this.selected.add(cb.value); else this.selected.delete(cb.value);
    });
    this.updateLabel(); this.onChange();
  }
  updateLabel(){
    const n=this.selected.size;
    if(n===0){this.labelEl.textContent=this.allLabel; this.labelEl.classList.add('placeholder');}
    else if(n===1){this.labelEl.textContent=[...this.selected][0]; this.labelEl.classList.remove('placeholder');}
    else {this.labelEl.textContent=n+' '+this.noun+' selected'; this.labelEl.classList.remove('placeholder');}
  }
  deselect(value){
    this.selected.delete(value);
    const cb=this.list.querySelector(`input[value="${CSS.escape(value)}"]`);
    if(cb) cb.checked=false;
    this.updateLabel(); this.onChange();
  }
  matches(value){return this.selected.size===0 || this.selected.has(value);}
  close(){this.panel.classList.remove('open'); this.toggleBtn.classList.remove('active');}
  reset(){
    this.selected.clear();
    this.list.querySelectorAll('input').forEach(cb=>cb.checked=false);
    this.search.value=''; this.search.dispatchEvent(new Event('input'));
    this.updateLabel();
  }
}

const multis=[...document.querySelectorAll('.ms')].map(el=>{
  const vals=uniq(el.dataset.ms).sort((a,b)=>String(a).localeCompare(String(b)));
  return new MultiSelect(el,vals,render);
});
document.addEventListener('click',()=>multis.forEach(m=>m.close()));

function populateSelects(){
  const years=uniq('year').sort();
  yearSel.innerHTML='<option value="">All years</option>'+years.map(y=>`<option>${y}</option>`).join('');
  const rounds=uniq('round').sort((a,b)=>String(a).localeCompare(String(b)));
  roundSel.innerHTML='<option value="">All rounds</option>'+rounds.map(r=>`<option>${r}</option>`).join('');
}

function roundLabel(r){return r==='Round 2 Extended'?'R2 Extended':'Round '+r;}

function filtered(){
  const y=yearSel.value, rd=roundSel.value;
  const mr=maxrank.value?parseInt(maxrank.value,10):null;
  return DATA.filter(r=>{
    for(const m of multis){ if(!m.matches(r[m.key])) return false; }
    if(y && r.year!==y) return false;
    if(rd && r.round!==rd) return false;
    if(mr!=null && (r.rank==null||r.rank>mr)) return false;
    return true;
  });
}

function sortRows(rows){
  return rows.sort((a,b)=>{
    let av=a[sortKey], bv=b[sortKey];
    if(sortKey==='rank'){av=av??Infinity; bv=bv??Infinity; return (av-bv)*sortDir;}
    return String(av).localeCompare(String(bv))*sortDir;
  });
}

function chipHtml(key,val,remover){
  return `<span class="af-chip"><span class="af-key">${esc(key)}</span><span class="af-val" title="${esc(val)}">${esc(val)}</span><button class="af-x" data-rm="${esc(remover)}" title="Remove">&times;</button></span>`;
}

function renderActiveFilters(){
  const box=$('#activeFilters');
  const chips=[];
  multis.forEach(m=>{
    const label=m.el.dataset.noun.replace(/s$/,'');
    [...m.selected].sort((a,b)=>a.localeCompare(b)).forEach(v=>chips.push(chipHtml(label,v,m.key+'::'+v)));
  });
  if(yearSel.value) chips.push(chipHtml('year',yearSel.value,'year'));
  if(roundSel.value) chips.push(chipHtml('round',roundLabel(roundSel.value),'round'));
  if(maxrank.value) chips.push(chipHtml('max rank','≤ '+parseInt(maxrank.value,10).toLocaleString(),'maxrank'));

  if(!chips.length){box.innerHTML='<span class="af-none">No filters applied — showing all records.</span>'; return;}
  box.innerHTML=chips.join('')+'<button class="af-clear" id="afClearAll">Clear all</button>';

  box.querySelectorAll('.af-x').forEach(btn=>btn.addEventListener('click',()=>{
    const rm=btn.dataset.rm;
    if(rm==='year'){yearSel.value='';render();}
    else if(rm==='round'){roundSel.value='';render();}
    else if(rm==='maxrank'){maxrank.value='';render();}
    else{ const i=rm.indexOf('::'); const key=rm.slice(0,i), val=rm.slice(i+2);
      const m=multis.find(x=>x.key===key); if(m) m.deselect(val); }
  }));
  $('#afClearAll').addEventListener('click',()=>$('#reset').click());
}

function render(){
  const rows=sortRows(filtered());
  renderActiveFilters();
  $('#count').textContent=rows.length.toLocaleString();
  $('#ncol').textContent=new Set(rows.map(r=>r.college)).size;
  $('#ncourse').textContent=new Set(rows.map(r=>r.course)).size;
  $('#empty').style.display=rows.length?'none':'block';
  $('#rows').innerHTML=rows.slice(0,2000).map(r=>`<tr>
    <td class="college">${esc(r.college)}</td>
    <td class="course">${esc(r.course)}</td>
    <td><span class="badge y${r.year}">${r.year}</span></td>
    <td class="round">${roundLabel(r.round)}</td>
    <td class="rank">${r.rank!=null?r.rank.toLocaleString():'&mdash;'}</td>
  </tr>`).join('');
}

document.querySelectorAll('thead th').forEach(th=>{
  th.addEventListener('click',()=>{
    const k=th.dataset.key;
    if(sortKey===k) sortDir*=-1; else {sortKey=k; sortDir=1;}
    document.querySelectorAll('.arrow').forEach(a=>a.textContent='');
    th.querySelector('.arrow').textContent=sortDir>0?'▲':'▼';
    render();
  });
});

[yearSel,roundSel,maxrank].forEach(el=>el.addEventListener('input',render));
$('#reset').addEventListener('click',()=>{
  yearSel.value='';roundSel.value='';maxrank.value='';
  multis.forEach(m=>m.reset());
  sortKey='rank';sortDir=1;document.querySelectorAll('.arrow').forEach(a=>a.textContent='');
  render();
});

populateSelects();
render();
</script>
</body>
</html>
